<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Canales - Dog Station</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #ff9f43;
            margin-bottom: 5px;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .btn-canal {
            background-color: #ff9f43;
            color: #121212;
        }
        .btn-canal:active {
            background-color: #f39c12;
            transform: scale(0.98);
        }
        .btn-apagar {
            background-color: #ee5253;
            color: white;
        }
        .btn-apagar:active {
            background-color: #d63031;
            transform: scale(0.98);
        }
        .btn-encender {
            background-color: #10ac84;
            color: white;
        }
        .btn-encender:active {
            background-color: #0f9675;
            transform: scale(0.98);
        }
        .info-canal {
            margin-top: 15px;
            padding: 10px;
            background-color: #2e2e2e;
            border-radius: 6px;
            border-left: 4px solid #ff9f43;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dog TV Station 🐶📺</h1>
        <p>Control de canales en vivo</p>

        <!-- Botón de Siguiente Canal -->
        <button class="btn btn-canal" onclick="cambiarCanal()">Siguiente Canal ➡️</button>
        
        <!-- Estado del canal en reproducción -->
        <div id="infoCanal" class="info-canal">
            Reproduciendo: <strong id="nombreCanal">-</strong>
        </div>

        <hr style="border-color: #333; margin: 25px 0;">

        <!-- Control de pantalla -->
        <button class="btn btn-encender" onclick="enviarAccion('/api/encender_pantalla')">Encender Pantalla 💡</button>
        <button class="btn btn-apagar" onclick="enviarAccion('/api/apagar_pantalla')">Apagar Pantalla 😴</button>
    </div>

    <script>
        function cambiarCanal() {
            fetch('/api/siguiente_canal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.canal_nombre) {
                    const infoDiv = document.getElementById('infoCanal');
                    const nombreSpan = document.getElementById('nombreCanal');
                    infoDiv.style.display = 'block';
                    nombreSpan.textContent = `${data.canal_nombre} (${data.index}/${data.total})`;
                }
            })
            .catch(err => console.error("Error al cambiar canal:", err));
        }

        function enviarAccion(ruta) {
            fetch(ruta, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(data => {
                console.log(data.status);
                // Si apagamos la pantalla, ocultamos el aviso del canal activo
                if (ruta.includes('apagar_pantalla')) {
                    document.getElementById('infoCanal').style.display = 'none';
                }
            })
            .catch(err => console.error("Error en acción:", err));
        }
    </script>
</body>
</html>
